<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftCloud TV - 搜索</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <a href="index.html" class="logo">
                <i class="ri-movie-2-line"></i> SoftCloud TV
            </a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="list.html?t=1">电影</a>
                <a href="list.html?t=2">剧集</a>
                <a href="list.html?t=3">综艺</a>
                <a href="list.html?t=4">动漫</a>
            </div>
            <div class="search-box">
                <i class="ri-search-line"></i>
                <input type="text" placeholder="搜索影视..." onkeydown="if(event.key==='Enter')window.location='search.html?q='+encodeURIComponent(this.value)">
            </div>
        </nav>

        <div class="mobile-tabbar">
            <div class="tabbar-inner">
                <a href="index.html" class="tab-item"><i class="ri-compass-3-line"></i><span>首页</span></a>
                <a href="list.html?t=1" class="tab-item"><i class="ri-film-line"></i><span>电影</span></a>
                <a href="list.html?t=2" class="tab-item"><i class="ri-tv-2-line"></i><span>剧集</span></a>
                <a href="list.html?t=3" class="tab-item"><i class="ri-disc-line"></i><span>综艺</span></a>
                <a href="list.html?t=4" class="tab-item"><i class="ri-ghost-line"></i><span>动漫</span></a>
            </div>
        </div>

        <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <i class="ri-arrow-up-line"></i>
        </div>

        <div class="container">
            <div class="search-hero">
                <h1>搜索影视</h1>
                <div class="search-big-input">
                    <i class="ri-search-line"></i>
                    <input type="text" v-model="keyword" placeholder="输入电影名、演员、导演..." @keydown.enter="doSearch">
                </div>
            </div>

            <div class="loading-spinner" v-if="isLoading">加载中...</div>

            <!-- 搜索结果 -->
            <template v-if="searched && !isLoading">
                <div class="search-stats" v-if="items.length">
                    搜索 "<em>{{ keyword }}</em>" 共找到 <em>{{ total }}</em> 个结果
                </div>
                <div class="grid fade-in" v-if="items.length">
                    <a class="card" v-for="item in items" :key="item.vod_id" :href="'detail.html?id=' + item.vod_id">
                        <div class="card-poster">
                            <img v-if="item.vod_pic" :src="item.vod_pic" :alt="item.vod_name" loading="lazy">
                        </div>
                        <div class="badge-top-left" v-if="item.vod_remarks">{{ item.vod_remarks }}</div>
                        <div class="card-overlay">
                            <div class="play-btn"><i class="ri-play-fill"></i></div>
                            <div class="card-info">
                                <div class="card-title">{{ item.vod_name }}</div>
                                <div class="card-meta"><span>{{ item.type_name }}</span></div>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="pagination" v-if="pagecount > 1">
                    <a class="page-btn" v-if="page > 1" :href="searchUrl(page - 1)"><i class="ri-arrow-left-s-line"></i></a>
                    <a class="page-btn" v-if="pageStart > 1" :href="searchUrl(1)">1</a>
                    <span class="page-btn dots" v-if="pageStart > 2">...</span>
                    <a class="page-btn" v-for="p in pageRange" :key="p" :class="{ active: p === page }" :href="searchUrl(p)">{{ p }}</a>
                    <span class="page-btn dots" v-if="pageEnd < pagecount - 1">...</span>
                    <a class="page-btn" v-if="pageEnd < pagecount" :href="searchUrl(pagecount)">{{ pagecount }}</a>
                    <a class="page-btn" v-if="page < pagecount" :href="searchUrl(page + 1)"><i class="ri-arrow-right-s-line"></i></a>
                </div>

                <div class="empty-state" v-if="!items.length">
                    <i class="ri-search-eye-line"></i>
                    <p>没有找到 "{{ keyword }}" 相关影视，换个关键词试试吧</p>
                </div>
            </template>

            <!-- 未搜索：最新更新 -->
            <template v-if="!searched && !isLoading">
                <div class="section" v-if="trending.length">
                    <div class="section-header">
                        <h2 class="section-title">最新更新</h2>
                    </div>
                    <div class="grid fade-in">
                        <a class="card" v-for="item in trending" :key="item.vod_id" :href="'detail.html?id=' + item.vod_id">
                            <div class="card-poster">
                                <img v-if="item.vod_pic" :src="item.vod_pic" :alt="item.vod_name" loading="lazy">
                            </div>
                            <div class="badge-top-left" v-if="item.vod_remarks">{{ item.vod_remarks }}</div>
                            <div class="card-overlay">
                                <div class="play-btn"><i class="ri-play-fill"></i></div>
                                <div class="card-info">
                                    <div class="card-title">{{ item.vod_name }}</div>
                                    <div class="card-meta"><span>{{ item.type_name }}</span></div>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </template>

            <div class="grid" v-if="!searched && isLoading">
                <div class="skeleton skeleton-card" v-for="n in 12" :key="n"></div>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-brand"><i class="ri-movie-2-line"></i> SoftCloud TV</div>
            <div class="footer-nav">
                <a href="index.html">首页</a>
                <a href="list.html?t=1">电影</a>
                <a href="list.html?t=2">剧集</a>
                <a href="list.html?t=3">综艺</a>
                <a href="list.html?t=4">动漫</a>
            </div>
            <div class="footer-copy">&copy; 2026 SoftCloud TV &middot; 仅供学习交流</div>
        </footer>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search)
    const q = urlParams.get('q') || ''
    const pg = Math.max(1, parseInt(urlParams.get('page')) || 1)

    if (q) document.title = '搜索: ' + q + ' - SoftCloud TV'

    const { createApp } = Vue
    createApp({
        data() {
            return {
                keyword: q,
                searched: !!q,
                page: pg,
                items: [],
                trending: [],
                total: 0,
                pagecount: 1,
                isLoading: true
            }
        },
        computed: {
            pageStart() { return Math.max(1, this.page - 2) },
            pageEnd()   { return Math.min(this.pagecount, this.page + 2) },
            pageRange() {
                const r = []
                for (let i = this.pageStart; i <= this.pageEnd; i++) r.push(i)
                return r
            }
        },
        mounted() {
            if (this.searched) this.fetchSearch()
            else this.fetchTrending()
        },
        methods: {
            doSearch() {
                if (this.keyword.trim()) {
                    window.location = 'search.html?q=' + encodeURIComponent(this.keyword.trim())
                }
            },
            async fetchSearch() {
                try {
                    const res = await fetch('/api/proxy?do=search&wd=' + encodeURIComponent(this.keyword) + '&page=' + this.page)
                    const data = await res.json()
                    this.items     = data.list || []
                    this.total     = parseInt(data.total) || 0
                    this.pagecount = parseInt(data.pagecount) || 1
                } catch(e) {}
                this.isLoading = false
            },
            async fetchTrending() {
                try {
                    const res = await fetch('/api/proxy?do=list&page=1')
                    const data = await res.json()
                    this.trending = (data.list || []).slice(0, 12)
                } catch(e) {}
                this.isLoading = false
            },
            searchUrl(p) {
                return 'search.html?q=' + encodeURIComponent(this.keyword) + (p > 1 ? '&page=' + p : '')
            }
        }
    }).mount('#app')

    var btt = document.getElementById('backToTop')
    if (btt) window.addEventListener('scroll', function() {
        btt.classList.toggle('visible', window.pageYOffset > 400)
    }, { passive: true })
    </script>
</body>
</html>
