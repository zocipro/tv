<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftCloud TV - 影视列表</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <div id="app" v-cloak>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <i class="ri-movie-2-line"></i> SoftCloud TV
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">首页</a>
                <a href="list.html?t=1">电影</a>
                <a href="list.html?t=2">剧集</a>
                <a href="list.html?t=3">综艺</a>
                <a href="list.html?t=4">动漫</a>
            </div>
            <div class="search-box">
                <i class="ri-search-line"></i>
                <input type="text" placeholder="搜索影视..." onkeydown="if(event.key==='Enter')window.location='search.html?q='+encodeURIComponent(this.value)">
            </div>
        </nav>

        <div class="mobile-tabbar" id="mobileTabbar">
            <div class="tabbar-inner">
                <a href="index.html" class="tab-item"><i class="ri-compass-3-line"></i><span>首页</span></a>
                <a href="list.html?t=1" class="tab-item"><i class="ri-film-line"></i><span>电影</span></a>
                <a href="list.html?t=2" class="tab-item"><i class="ri-tv-2-line"></i><span>剧集</span></a>
                <a href="list.html?t=3" class="tab-item"><i class="ri-disc-line"></i><span>综艺</span></a>
                <a href="list.html?t=4" class="tab-item"><i class="ri-ghost-line"></i><span>动漫</span></a>
            </div>
        </div>

        <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <i class="ri-arrow-up-line"></i>
        </div>

        <div class="container">
            <div class="breadcrumb">
                <a href="index.html"><i class="ri-home-4-line"></i> 首页</a>
                <span class="sep">/</span>
                <span class="current">{{ pageTitle }}</span>
            </div>

            <!-- 二级分类筛选 -->
            <div class="filter-section" v-if="subCats.length">
                <div class="filter-row">
                    <span class="filter-label">分类</span>
                    <div class="filter-scroll">
                        <a class="filter-item" :class="{ active: activeCat === 0 }" :href="'list.html?t=' + typeId">全部</a>
                        <a class="filter-item" v-for="cat in subCats" :key="cat.type_id"
                           :class="{ active: activeCat === cat.type_id }"
                           :href="'list.html?t=' + typeId + '&c=' + cat.type_id">{{ cat.type_name }}</a>
                    </div>
                </div>
            </div>

            <div class="result-info" v-if="!isLoading">共 <em>{{ total }}</em> 部 · 第 {{ page }}/{{ pagecount }} 页</div>

            <!-- 骨架屏 -->
            <div class="grid" v-if="isLoading">
                <div class="skeleton skeleton-card" v-for="n in 12" :key="n"></div>
            </div>

            <!-- 真实列表 -->
            <div class="grid fade-in" v-else>
                <a class="card" v-for="item in items" :key="item.vod_id" :href="'detail.html?id=' + item.vod_id">
                    <div class="card-poster">
                        <img v-if="item.vod_pic" :src="item.vod_pic" :alt="item.vod_name" loading="lazy">
                    </div>
                    <div class="badge-top-left" v-if="item.vod_remarks">{{ item.vod_remarks }}</div>
                    <div class="card-overlay">
                        <div class="play-btn"><i class="ri-play-fill"></i></div>
                        <div class="card-info">
                            <div class="card-title">{{ item.vod_name }}</div>
                            <div class="card-meta"><span>{{ item.type_name }}</span></div>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 翻页 -->
            <div class="pagination" v-if="pagecount > 1 && !isLoading">
                <a class="page-btn" v-if="page > 1" :href="pageUrl(page - 1)"><i class="ri-arrow-left-s-line"></i></a>
                <a class="page-btn" v-if="pageStart > 1" :href="pageUrl(1)">1</a>
                <span class="page-btn dots" v-if="pageStart > 2">...</span>
                <a class="page-btn" v-for="p in pageRange" :key="p" :class="{ active: p === page }" :href="pageUrl(p)">{{ p }}</a>
                <span class="page-btn dots" v-if="pageEnd < pagecount - 1">...</span>
                <a class="page-btn" v-if="pageEnd < pagecount" :href="pageUrl(pagecount)">{{ pagecount }}</a>
                <a class="page-btn" v-if="page < pagecount" :href="pageUrl(page + 1)"><i class="ri-arrow-right-s-line"></i></a>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-brand"><i class="ri-movie-2-line"></i> SoftCloud TV</div>
            <div class="footer-nav">
                <a href="index.html">首页</a>
                <a href="list.html?t=1">电影</a>
                <a href="list.html?t=2">剧集</a>
                <a href="list.html?t=3">综艺</a>
                <a href="list.html?t=4">动漫</a>
            </div>
            <div class="footer-copy">&copy; 2026 SoftCloud TV &middot; 仅供学习交流</div>
        </footer>
    </div>

    <script>
    const params = new URLSearchParams(window.location.search)
    const catNames = { 1: '电影', 2: '剧集', 3: '综艺', 4: '动漫' }
    const t = parseInt(params.get('t')) || 1
    const c = parseInt(params.get('c')) || 0
    const pg = Math.max(1, parseInt(params.get('page')) || 1)

    document.title = (catNames[t] || '影视列表') + ' - SoftCloud TV'

    // Set active nav
    document.querySelectorAll('#navLinks a, #mobileTabbar .tab-item').forEach(a => {
        if (a.href.includes('t=' + t)) a.classList.add('active')
    })

    const { createApp } = Vue
    createApp({
        data() {
            return {
                typeId: t,
                activeCat: c,
                page: pg,
                pageTitle: catNames[t] || '影视列表',
                subCats: [],
                items: [],
                total: 0,
                pagecount: 1,
                isLoading: true
            }
        },
        computed: {
            pageStart() { return Math.max(1, this.page - 2) },
            pageEnd()   { return Math.min(this.pagecount, this.page + 2) },
            pageRange() {
                const r = []
                for (let i = this.pageStart; i <= this.pageEnd; i++) r.push(i)
                return r
            }
        },
        mounted() {
            this.fetchData()
            this.fetchClasses()
        },
        methods: {
            async fetchData() {
                const tid = this.activeCat > 0 ? this.activeCat : this.typeId
                try {
                    const res = await fetch('/api/proxy?do=list&tid=' + tid + '&page=' + this.page)
                    const data = await res.json()
                    this.items     = data.list || []
                    this.total     = parseInt(data.total) || 0
                    this.pagecount = parseInt(data.pagecount) || 1
                } catch(e) {}
                this.isLoading = false
            },
            async fetchClasses() {
                try {
                    const res = await fetch('/api/proxy?do=classes')
                    const all = await res.json()
                    this.subCats = all.filter(c => parseInt(c.type_pid) === this.typeId)
                } catch(e) {}
            },
            pageUrl(p) {
                let url = 'list.html?t=' + this.typeId
                if (this.activeCat > 0) url += '&c=' + this.activeCat
                if (p > 1) url += '&page=' + p
                return url
            }
        }
    }).mount('#app')

    var btt = document.getElementById('backToTop')
    if (btt) window.addEventListener('scroll', function() {
        btt.classList.toggle('visible', window.pageYOffset > 400)
    }, { passive: true })
    </script>
</body>
</html>
